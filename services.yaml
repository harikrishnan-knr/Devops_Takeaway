---
- name: Updating and installing jdk
  hosts: all
  become: true

  tasks:
    - name: update
      apt:
        update_cache: yes

    - name: install jdk
      apt:
        name: openjdk-21-jdk
        state: present

- name: install jenkins in jenkins machine
  hosts: 172.31.0.87
  become: true

  tasks:
    - name: Ensure apt keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Jenkins GPG key
      ansible.builtin.get_url:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
        dest: /etc/apt/keyrings/jenkins-keyring.asc
        mode: '0644'

    - name: Add Jenkins apt repository
      ansible.builtin.apt_repository:
        repo: >
          deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc]
          https://pkg.jenkins.io/debian-stable binary/
        filename: jenkins
        state: present

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present

    - name: Start and enable Jenkins
      service:
        name: jenkins
        state: started
        enabled: yes


- name: installtomcat in tomcat machine
  hosts: 172.31.0.83
  become: true

  tasks:

    - name: install tomcat
      apt:
        name: tomcat10
        state: present
    - name: install tomcat-admin
      apt:
        name: tomcat10-admin
        state: present

    - name: start and enable tomcat
      service:
        name: tomcat10
        state: started
        enabled: yes

- name: install docker in slave machine
  hosts: 172.31.0.83
  become: true

  tasks:
    - name: install docker
      apt:
        name: docker.io
        state: present

    - name: start and enable docker
      service:
        name: docker
        state: started
        enabled: yes
    - name: install maven
      apt:
        name: maven
        state: present
